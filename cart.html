<!DOCTYPE html>
<html>
<head>

<title>Checkout</title>
<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width,initial-scale=1">

</head>

<body>

<h2>Checkout</h2>

<div class="checkout-product">

<img id="pimg">

<div>

<h3 id="pname"></h3>

<p>Quantity: <span id="pqty"></span></p>

<p>Total: ₹<span id="ptotal"></span></p>

</div>

</div>


<h3>Address</h3>

<input placeholder="Building / Society">
<input placeholder="Flat Number">
<input placeholder="Street">
<input placeholder="City">
<input placeholder="Pincode">


<h3>Payment</h3>

<button onclick="payUPI()">Pay with UPI</button>

<button onclick="cod()">Cash on Delivery</button>


<script>

let order = JSON.parse(localStorage.getItem("order"))

document.getElementById("pimg").src = order.img
document.getElementById("pname").innerText = order.name
document.getElementById("pqty").innerText = order.qty

let total = order.price * order.qty

document.getElementById("ptotal").innerText = total


function payUPI(){

window.location =
"upi://pay?pa=aditya.kbelose@oksbi&pn=AETHELL&am="+total

}


function cod(){

let msg =
"New AETHELL Order:%0A"+
order.name+
"%0AQty:"+order.qty+
"%0ATotal:"+total

window.location =
"https://wa.me/919987782822?text="+msg

}

</script>

</body>
</html>
