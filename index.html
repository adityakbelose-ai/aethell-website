<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AETHELL</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
color:black;
}

/* loading screen */

#loader{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
letter-spacing:5px;
z-index:1000;
}

/* header */

header{
display:flex;
justify-content:center;
align-items:center;
padding:20px;
font-size:28px;
letter-spacing:4px;
}

/* cart */

.cart{
position:fixed;
top:20px;
right:20px;
background:black;
color:white;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

/* products */

.products{
padding:20px;
}

.product{
margin-bottom:40px;
cursor:pointer;
}

.product-image{
position:relative;
overflow:hidden;
border-radius:10px;
}

.product-image img{
width:100%;
display:block;
transition:0.4s;
}

.product:hover img{
transform:scale(1.03);
}

/* shine animation */

.product-image::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:50%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.6),
transparent
);
animation:shine 3s infinite;
}

@keyframes shine{
0%{left:-100%;}
100%{left:120%;}
}

/* viewer popup */

#viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
overflow:auto;
z-index:999;
}

.viewer-content{
padding:20px;
}

.viewer-content img{
width:100%;
border-radius:10px;
}

.desc{
margin-top:15px;
font-size:15px;
line-height:1.6;
color:#444;
}

.dimensions{
margin-top:10px;
font-size:14px;
color:#777;
}

/* buttons */

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
background:black;
color:white;
font-size:15px;
cursor:pointer;
}

/* checkout */

#checkout{
display:none;
padding:20px;
}

.checkout-product{
display:flex;
align-items:center;
margin-bottom:15px;
}

.checkout-product img{
width:70px;
border-radius:8px;
margin-right:10px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

</style>

</head>

<body>

<div id="loader">AETHELL</div>

<header>AETHELL</header>

<div class="cart" onclick="openCheckout()">🛒 <span id="cartCount">0</span></div>

<section class="products">

<div class="product" onclick="openProduct(0)">
<div class="product-image">
<img src="cmiygl1.jpg">
</div>
<h3>CMIYGL Mirror</h3>
<p>₹5,999</p>
</div>

<div class="product" onclick="openProduct(1)">
<div class="product-image">
<img src="mspaint1.jpg">
</div>
<h3>MS PAINT Mirror</h3>
<p>₹8,999</p>
</div>

<div class="product" onclick="openProduct(2)">
<div class="product-image">
<img src="captcha1.jpg">
</div>
<h3>reCAPTCHA Mirror</h3>
<p>₹5,999</p>
</div>

<div class="product" onclick="openProduct(3)">
<div class="product-image">
<img src="queen1.jpg">
</div>
<h3>Queen of Hearts Mirror</h3>
<p>₹5,499</p>
</div>

<div class="product" onclick="openProduct(4)">
<div class="product-image">
<img src="king1.jpg">
</div>
<h3>King of Hearts Mirror</h3>
<p>₹5,499</p>
</div>

</section>

<div id="viewer">

<div class="viewer-content">

<img id="viewerImg">

<h2 id="viewerTitle"></h2>

<p id="viewerDesc" class="desc"></p>

<p id="viewerDim" class="dimensions"></p>

<button onclick="addToCart()">Add To Cart</button>

<button onclick="buyNow()">Buy Now</button>

<button onclick="closeViewer()">Close</button>

</div>

</div>

<div id="checkout">

<h2>Checkout</h2>

<div id="orderPreview"></div>

<input id="building" placeholder="Building / Society">
<input id="flat" placeholder="Flat Number">
<input id="area" placeholder="Area / Street">
<input id="pincode" placeholder="Pincode">

<label>
<input type="radio" name="pay" value="upi" checked>
UPI / GPay
</label>

<br>

<label>
<input type="radio" name="pay" value="cod">
Cash on Delivery
</label>

<button onclick="checkout()">Checkout</button>

</div>

<script>

setTimeout(()=>{
document.getElementById("loader").style.display="none"
},1500)

let products=[

{
name:"CMIYGL Mirror",
price:5999,
img:"cmiygl1.jpg",
desc:"A reflective reinterpretation of the iconic CMIYGL aesthetic.",
dim:'15" x 24"'
},

{
name:"MS PAINT Mirror",
price:8999,
img:"mspaint1.jpg",
desc:"A retro-modern tribute to early digital creativity.",
dim:'47" x 31"'
},

{
name:"reCAPTCHA Mirror",
price:5999,
img:"captcha1.jpg",
desc:"To become something greater one must verify themselves.",
dim:'42" x 31"'
},

{
name:"Queen of Hearts Mirror",
price:5499,
img:"queen1.jpg",
desc:"Royal aesthetics crafted for spaces with elegance.",
dim:'48" x 31"'
},

{
name:"King of Hearts Mirror",
price:5499,
img:"king1.jpg",
desc:"Bold and regal design for modern interiors.",
dim:'48" x 31"'
}

]

let selected=null
let cart=[]
let quantities={}

function openProduct(i){

selected=i

document.getElementById("viewerImg").src=products[i].img
document.getElementById("viewerTitle").innerText=products[i].name
document.getElementById("viewerDesc").innerText=products[i].desc
document.getElementById("viewerDim").innerText="Dimensions: "+products[i].dim

document.getElementById("viewer").style.display="block"

}

function closeViewer(){
document.getElementById("viewer").style.display="none"
}

function addToCart(){

let product=products[selected]

cart.push(product)

if(!quantities[product.name]){
quantities[product.name]=1
}else{
quantities[product.name]++
}

document.getElementById("cartCount").innerText=cart.length

}

function buyNow(){

cart=[products[selected]]
quantities={}
quantities[products[selected].name]=1

openCheckout()

}

function openCheckout(){

document.getElementById("checkout").style.display="block"

let preview=""

cart.forEach(p=>{

let qty=quantities[p.name]||1

preview+=`
<div class="checkout-product">
<img src="${p.img}">
<div>
<div>${p.name}</div>
<div>Qty: ${qty}</div>
</div>
</div>
`

})

document.getElementById("orderPreview").innerHTML=preview

window.scrollTo(0,document.body.scrollHeight)

}

function checkout(){

let total=0

cart.forEach(p=>{
let qty=quantities[p.name]||1
total+=p.price*qty
})

let payment=document.querySelector('input[name="pay"]:checked').value

if(payment==="upi"){

window.location.href=
"upi://pay?pa=aditya.kbelose@oksbi&pn=Aethell&am="+total+"&cu=INR"

}else{

let order="New AETHELL Order%0A"

cart.forEach(p=>{
let qty=quantities[p.name]||1
order+=p.name+" x"+qty+"%0A"
})

window.location.href=
"https://wa.me/919987782822?text="+order

}

}

</script>

</body>
</html>
