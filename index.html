<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AETHELL</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
color:black;
}

#loader{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
letter-spacing:6px;
z-index:2000;
}

header{
text-align:center;
margin:30px 0 10px 0;
font-size:30px;
letter-spacing:5px;
}

.caption{
font-size:14px;
letter-spacing:3px;
margin-top:5px;
opacity:.7;
}

.menu{
position:fixed;
left:20px;
top:20px;
font-size:28px;
cursor:pointer;
z-index:1001;
}

.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:white;
box-shadow:2px 0 10px rgba(0,0,0,0.15);
transition:.3s;
padding-top:60px;
z-index:1000;
}

.sidebar.open{left:0;}

.closeSidebar{
position:absolute;
top:15px;
right:20px;
font-size:22px;
cursor:pointer;
}

.sidebar a{
display:block;
padding:15px 25px;
text-decoration:none;
color:black;
}

.cart{
position:fixed;
right:20px;
top:20px;
background:black;
color:white;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
z-index:1001;
}

.products{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.product img{
width:100%;
border-radius:10px;
cursor:pointer;
}

.price{
font-weight:bold;
}

.old{
text-decoration:line-through;
color:gray;
font-size:13px;
margin-left:6px;
}

.off{
color:green;
font-size:13px;
margin-left:5px;
}

.emi{
font-size:12px;
opacity:.7;
margin-top:4px;
}

.product button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
background:black;
color:white;
cursor:pointer;
}

/* PRODUCT VIEWER */

#productPage{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:1200;
overflow:auto;
}

.viewer{
width:100%;
max-width:420px;
margin:0 auto;
padding:30px 20px 40px 20px;
text-align:center;
position:relative;
box-sizing:border-box;
}

.closePage{
position:absolute;
right:20px;
top:10px;
font-size:26px;
cursor:pointer;
}

.slider{
width:100%;
max-width:340px;
margin:0 auto;
}

.slider img{
width:100%;
height:auto;
max-height:55vh;
object-fit:contain;
border-radius:12px;
display:block;
margin:auto;
}

.dots{
text-align:center;
margin-top:10px;
}

.dot{
height:8px;
width:8px;
background:#ccc;
display:inline-block;
border-radius:50%;
margin:4px;
cursor:pointer;
}

.dot.active{
background:black;
}

.desc{
margin-top:18px;
line-height:1.6;
font-size:16px;
}

.dim{
margin-top:12px;
font-weight:bold;
font-size:16px;
}

.cartButton{
width:100%;
max-width:340px;
margin:12px auto 0 auto;
padding:14px;
background:black;
color:white;
border:none;
display:block;
font-size:16px;
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:1500;
}

.popup-content{
background:white;
padding:25px;
width:90%;
max-width:420px;
border-radius:10px;
position:relative;
}

.closePopup{
position:absolute;
right:15px;
top:10px;
font-size:20px;
cursor:pointer;
}

.checkout-item{
display:flex;
align-items:center;
margin-bottom:10px;
}

.checkout-item img{
width:60px;
margin-right:10px;
border-radius:6px;
}

.remove{
margin-left:auto;
cursor:pointer;
color:red;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
}

#toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px 20px;
border-radius:6px;
display:none;
}

.ig{
position:fixed;
bottom:20px;
right:20px;
width:50px;
height:50px;
background:black;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

</style>
</head>

<body>

<div id="loader">AETHELL</div>

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="cart" onclick="openCart()">🛒 <span id="count">0</span></div>

<div class="sidebar" id="sidebar">
<div class="closeSidebar" onclick="toggleMenu()">✕</div>
<a href="#">Home</a>
<a onclick="openAbout()">About Us</a>
<a href="https://wa.me/919987782822">Contact</a>
</div>

<header>
AETHELL
<div class="caption">Modern décor for modern spaces</div>
</header>

<section class="products" id="productContainer"></section>

<div id="toast">Added to Cart</div>

<div id="productPage">

<div class="viewer">

<div class="closePage" onclick="closeProduct()">✕</div>

<div class="slider">
<img id="slideImg">
</div>

<div class="dots" id="dots"></div>

<h2 id="title"></h2>
<h3 id="price"></h3>

<div class="desc" id="desc"></div>
<div class="dim" id="dim"></div>

<button class="cartButton" onclick="addCart(current)">Add To Cart</button>
<button class="cartButton" onclick="buyNow(current)">Buy Now</button>

</div>

</div>

<script>

setTimeout(()=>document.getElementById("loader").style.display="none",1000)

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open")
}

const productContainer=document.getElementById("productContainer")

let products=[

{name:"CMIYGL Mirror",price:5999,img:["cmiygl1.jpg","cmiygl2.jpg","cmiygl3.jpg"],desc:"A reflective reinterpretation of the iconic CMIYGL aesthetic.",dim:"15 x 24 inches"}

]

let current=0
let slide=0

products.forEach((p,i)=>{

let original=Math.round(p.price/0.8)
let emi=Math.round(p.price/3)

let html=`
<div class="product">

<img src="${p.img[0]}" onclick="viewProduct(${i})">

<h3>${p.name}</h3>

<div class="price">
₹${p.price}
<span class="old">₹${original}</span>
<span class="off">20% OFF</span>
</div>

<div class="emi">From ₹${emi}/month</div>

<button onclick="addCart(${i})">Add to Cart</button>
<button onclick="buyNow(${i})">Buy Now</button>

</div>
`

productContainer.innerHTML+=html

})

function viewProduct(i){

current=i
slide=0

document.getElementById("productPage").style.display="block"

document.getElementById("title").innerText=products[i].name
document.getElementById("price").innerText="₹"+products[i].price
document.getElementById("desc").innerText=products[i].desc
document.getElementById("dim").innerText="Dimensions: "+products[i].dim

renderSlider()

}

function closeProduct(){
document.getElementById("productPage").style.display="none"
}

function renderSlider(){

let img=document.getElementById("slideImg")

img.src=products[current].img[slide]

let dots=""

products[current].img.forEach((x,i)=>{
dots+=`<span class="dot ${i==slide?'active':''}" onclick="goSlide(${i})"></span>`
})

document.getElementById("dots").innerHTML=dots

}

function goSlide(i){
slide=i
renderSlider()
}

/* SWIPE */

let startX=0

document.getElementById("slideImg").addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.getElementById("slideImg").addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50){slide++}
if(endX-startX>50){slide--}

if(slide>=products[current].img.length) slide=0
if(slide<0) slide=products[current].img.length-1

renderSlider()

})

</script>

</body>
</html>
