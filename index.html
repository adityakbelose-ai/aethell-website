<!DOCTYPE html>
<html lang="en">

<head>

<style>

body{
margin:0;

background:#fafafa;
color:#111;
}

/* NAVBAR */

nav{
padding:20px;
font-weight:600;
letter-spacing:3px;
}

/* HERO */

.hero{
padding:60px 20px;
text-align:center;
}

.hero p{

}

/* SECTION */

.section{
padding:30px 20px;
}

/* PRODUCT CARD */

.product{
background:white;
border-radius:12px;
margin-bottom:30px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
overflow:hidden;
}

/* IMAGE SWIPE GALLERY */

.gallery{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
}

.gallery img{
width:100%;
flex-shrink:0;
scroll-snap-align:start;
}

/* PRODUCT INFO */

.product-info{
padding:18px;
}

button{
width:100%;
padding:14px;
background:black;
color:white;
border:none;
border-radius:8px;

}

display:none;
padding:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:6px;
}

.warning{
color:red;
font-size:14px;
display:none;
}

/* INSTAGRAM BUTTON */

.insta{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:14px;
border-radius:50%;
text-decoration:none;
