<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AETHELL</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
color:black;
}

#loader{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
letter-spacing:6px;
z-index:2000;
}

header{
display:flex;
align-items:center;
justify-content:center;
margin:30px 0;
font-size:30px;
letter-spacing:5px;
}

header:before,header:after{
content:"";
flex:1;
height:1px;
background:black;
margin:0 15px;
}

.menu{
position:fixed;
left:20px;
top:20px;
font-size:28px;
cursor:pointer;
z-index:1001;
}

.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:white;
box-shadow:2px 0 10px rgba(0,0,0,0.15);
transition:.3s;
padding-top:60px;
z-index:1000;
}

.sidebar.open{
left:0;
}

.closeSidebar{
position:absolute;
top:15px;
right:20px;
font-size:22px;
cursor:pointer;
}

.sidebar a{
display:block;
padding:15px 25px;
text-decoration:none;
color:black;
}

.cart{
position:fixed;
right:20px;
top:20px;
background:black;
color:white;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
z-index:1001;
}

.products{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s forwards;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

.product{
cursor:pointer;
}

.imageWrap{
position:relative;
border-radius:10px;
}

.imageWrap img{
width:100%;
border-radius:10px;
}

.product h3{
margin:10px 0 5px;
font-size:16px;
}

.product p{
margin:0;
}

.product button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
background:black;
color:white;
cursor:pointer;
transition:.15s;
}

.product button:active{
transform:scale(.95);
}

#productPage{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
overflow:auto;
z-index:1200;
}

#productPage img{
width:100%;
border-radius:10px;
}

.closePage{
position:absolute;
right:20px;
top:20px;
font-size:22px;
cursor:pointer;
}

#productPage button{
padding:12px;
width:100%;
margin-top:10px;
border:none;
background:black;
color:white;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:1500;
}

.popup-content{
background:white;
padding:25px;
width:90%;
max-width:420px;
border-radius:10px;
position:relative;
}

.closePopup{
position:absolute;
right:15px;
top:10px;
font-size:20px;
cursor:pointer;
}

.checkout-item{
display:flex;
align-items:center;
margin-bottom:10px;
}

.checkout-item img{
width:60px;
margin-right:10px;
border-radius:6px;
}

.remove{
margin-left:auto;
cursor:pointer;
color:red;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin:8px 0;
}

.cartButton{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
margin-top:10px;
cursor:pointer;
}

.ig{
position:fixed;
bottom:20px;
right:20px;
width:50px;
height:50px;
background:black;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px 20px;
border-radius:6px;
display:none;
}

</style>
</head>

<body>

<div id="loader">AETHELL</div>

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="cart" onclick="openCart()">🛒 <span id="count">0</span></div>

<div class="sidebar" id="sidebar">
<div class="closeSidebar" onclick="toggleMenu()">✕</div>
<a href="#">Home</a>
<a onclick="openAbout()">About Us</a>
<a href="https://docs.google.com/forms/d/e/1FAIpQLSdE6cRXuMMelbPQpyuv9FouDaYFMsJxm6UblKyjkCCFOIllNg/viewform?usp=header">Custom Mirror</a>
<a href="https://wa.me/919987782822">Contact</a>
</div>

<header>AETHELL</header>

<section class="products" id="products"></section>

<div id="toast">Added to Cart</div>

<div class="popup" id="cartPopup">
<div class="popup-content">
<div class="closePopup" onclick="closeCart()">✕</div>
<h2>Your Cart</h2>
<div id="cartItems"></div>
<button class="cartButton" onclick="openCheckout()">Proceed to Checkout</button>
</div>
</div>

<div class="popup" id="checkoutPopup">
<div class="popup-content">
<div class="closePopup" onclick="closeCheckout()">✕</div>
<h2>Checkout</h2>
<input id="name" placeholder="Name">
<input id="building" placeholder="Building / Society">
<input id="flat" placeholder="Flat Number">
<input id="area" placeholder="Area / Street">
<input id="pincode" placeholder="Pincode">
<button class="cartButton" onclick="checkout()">Pay With UPI</button>
</div>
</div>

<div class="ig" onclick="window.open('https://instagram.com/aethell.in')">IG</div>

<script>

setTimeout(()=>loader.style.display="none",1000)

function toggleMenu(){
sidebar.classList.toggle("open")
}

let products=[
{name:"CMIYGL Mirror",price:5999,img:"cmiygl1.jpg"},
{name:"MS PAINT Mirror",price:8999,img:"mspaint1.jpg"},
{name:"reCAPTCHA Mirror",price:5999,img:"captcha1.jpg"},
{name:"Queen of Hearts",price:5499,img:"queen1.jpg"},
{name:"King of Hearts",price:5499,img:"king1.jpg"}
]

let cart=[]

products.forEach((p,i)=>{
productsHTML=`
<div class="product">
<div class="imageWrap">
<img src="${p.img}" onclick="viewProduct(${i})">
</div>
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addCart(${i})">Add to Cart</button>
<button onclick="buyNow(${i})">Buy Now</button>
</div>
`
document.getElementById("products").innerHTML+=productsHTML
})

function addCart(i){
cart.push(products[i])
updateCart()
toast.style.display="block"
setTimeout(()=>toast.style.display="none",1500)
}

function buyNow(i){
cart=[products[i]]
updateCart()
openCheckout()
}

function updateCart(){
count.innerText=cart.length
}

function openCart(){

let html=""

cart.forEach((p,i)=>{
html+=`
<div class="checkout-item">
<img src="${p.img}">
${p.name}
<div class="remove" onclick="removeItem(${i})">✕</div>
</div>
`
})

cartItems.innerHTML=html

cartPopup.style.display="flex"

}

function closeCart(){
cartPopup.style.display="none"
}

function removeItem(i){
cart.splice(i,1)
updateCart()
openCart()
}

function openCheckout(){
cartPopup.style.display="none"
checkoutPopup.style.display="flex"
}

function closeCheckout(){
checkoutPopup.style.display="none"
}

function checkout(){

let name=document.getElementById("name").value
let building=document.getElementById("building").value
let flat=document.getElementById("flat").value
let area=document.getElementById("area").value
let pincode=document.getElementById("pincode").value

let total=0
let order=""

cart.forEach(p=>{
order+=p.name+" ₹"+p.price+" , "
total+=p.price
})

let message=`New AETHELL Order%0AName:${name}%0AOrder:${order}%0AAddress:${building} ${flat} ${area}%0APincode:${pincode}%0ATotal:₹${total}`

window.open(`https://wa.me/919987782822?text=${message}`)

window.location.href=`upi://pay?pa=aditya.kbelose@oksbi&pn=Aethell&am=${total}&cu=INR`

}

</script>

</body>
</html>
