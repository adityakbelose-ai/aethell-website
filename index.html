<html lang="en">

        .trust-bar {

        .caption { font-size: 13px; letter-spacing: 4px; margin-top: 8px; opacity: .6; text-transform: uppercase; }

        /* UPGRADE: Sidebar Return Policy Link */

        .sidebar-footer a { font-size: 12px; opacity: 0.5; padding: 10px 30px; }

        .cart { position: fixed; right: 20px; top: 25px; background: black; color: white; padding: 8px 16px; border-radius: 30px; cursor: pointer; z-index: 1001; font-weight: bold; }

        .price { font-weight: bold; margin-top: 10px; font-size: 16px; }
        .old { text-decoration: line-through; color: #999; font-size: 13px; margin-left: 6px; }
        .off { color: #27ae60; font-size: 13px; font-weight: bold; }
        .emi-tag { font-size: 11px; color: #666; margin-top: 4px; }
        .product button { width: 100%; padding: 12px; margin-top: 10px; border: none; background: black; color: white; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 13px; }

        .viewer { max-width: 480px; margin: 40px auto; padding: 0 20px; text-align: center; position: relative; box-sizing: border-box; }
        .closePage { position: absolute; right: 15px; top: -15px; font-size: 32px; cursor: pointer; z-index: 100; }
        .slider-container { position: relative; overflow: hidden; border-radius: 15px; touch-action: pan-y; background: #eee; }
        #slideImg { width: 100%; max-height: 60vh; object-fit: contain; }
        .dots { text-align: center; margin-top: 15px; }
        .dot { height: 8px; width: 8px; background: #ddd; display: inline-block; border-radius: 50%; margin: 0 4px; }
        .dot.active { background: black; width: 20px; border-radius: 10px; transition: 0.3s; }
        .desc { margin-top: 25px; line-height: 1.6; color: #444; font-size: 15px; }
        .dim { margin-top: 15px; font-weight: bold; border-top: 1px solid #eee; padding-top: 15px; }
        .cartButton { width: 100%; padding: 16px; background: black; color: white; border: none; margin-top: 12px; cursor: pointer; font-weight: bold; font-size: 16px; border-radius: 8px; }
