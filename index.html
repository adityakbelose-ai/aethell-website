<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHELL | Modern Decor</title>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: white; color: black; overflow-x: hidden; }
        #loader { position: fixed; width: 100%; height: 100%; background: black; color: white; display: flex; align-items: center; justify-content: center; font-size: 32px; letter-spacing: 6px; z-index: 2000; }
        
        /* Trust Bar */
        .trust-bar { background: #f9f9f9; border-bottom: 1px solid #eee; text-align: center; padding: 6px 0; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #666; }

        header { text-align: center; margin: 40px 0 20px 0; font-size: 34px; letter-spacing: 6px; font-weight: bold; }
        .caption { font-size: 13px; letter-spacing: 4px; margin-top: 8px; opacity: .6; text-transform: uppercase; }
        
        .menu { position: fixed; left: 20px; top: 25px; font-size: 28px; cursor: pointer; z-index: 1001; }
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; box-shadow: 5px 0 15px rgba(0,0,0,0.1); transition: .4s cubic-bezier(0.4, 0, 0.2, 1); padding-top: 80px; z-index: 1000; }
        .sidebar.open { left: 0; }
        .closeSidebar { position: absolute; top: 20px; right: 25px; font-size: 26px; cursor: pointer; }
        .sidebar a { display: block; padding: 18px 30px; text-decoration: none; color: black; font-size: 17px; letter-spacing: 1px; cursor: pointer; }
        .sidebar-bottom { position: absolute; bottom: 30px; width: 100%; border-top: 1px solid #eee; padding-top: 10px; }
        
        .cart { position: fixed; right: 20px; top: 25px; background: black; color: white; padding: 8px 16px; border-radius: 30px; cursor: pointer; z-index: 1001; font-weight: bold; }
        .products { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .product img { width: 100%; border-radius: 12px; cursor: pointer; aspect-ratio: 1/1; object-fit: cover; background: #f9f9f9; }
        .price { font-weight: bold; margin-top: 10px; font-size: 16px; }
        .old { text-decoration: line-through; color: #999; font-size: 13px; margin-left: 6px; }
        .off { color: #27ae60; font-size: 13px; font-weight: bold; }
        .emi-tag { font-size: 11px; color: #666; margin-top: 4px; }
        .product button { width: 100%; padding: 12px; margin-top: 10px; border: none; background: black; color: white; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 13px; }
        
        /* VIEWER */
        #productPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1200; overflow-y: auto; }
        .viewer { max-width: 480px; margin: 40px auto; padding: 0 20px; text-align: center; position: relative; box-sizing: border-box; }
        .closePage { position: absolute; right: 15px; top: -15px; font-size: 32px; cursor: pointer; z-index: 100; }
        .slider-container { position: relative; overflow: hidden; border-radius: 15px; touch-action: pan-y; background: #eee; }
        #slideImg { width: 100%; max-height: 60vh; object-fit: contain; transition: transform 0.3s ease-out; }
        .dots { text-align: center; margin-top: 15px; }
        .dot { height: 8px; width: 8px; background: #ddd; display: inline-block; border-radius: 50%; margin: 0 4px; transition: 0.3s; }
        .dot.active { background: black; width: 20px; border-radius: 10px; }
        .desc { margin-top: 25px; line-height: 1.6; color: #444; font-size: 15px; }
        .dim { margin-top: 15px; font-weight: bold; border-top: 1px solid #eee; padding-top: 15px; }
        .cartButton { width: 100%; padding: 16px; background: black; color: white; border: none; margin-top: 12px; cursor: pointer; font-weight: bold; font-size: 16px; border-radius: 8px; }

        .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1500; backdrop-filter: blur(4px); }
        .popup-content { background: white; padding: 30px; width: 90%; max-width: 420px; border-radius: 20px; position: relative; max-height: 85vh; overflow-y: auto; }
        .closePopup { position: absolute; right: 20px; top: 20px; font-size: 26px; cursor: pointer; }
        
        /* Order Summary Box */
        .order-summary { background: #f9f9f9; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #eee; text-align: center; }
        .total-display { font-size: 20px; font-weight: bold; }

        .checkout-item { display: flex; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
        .checkout-item img { width: 60px; height: 60px; margin-right: 15px; border-radius: 8px; object-fit: cover; }
        .remove { margin-left: auto; cursor: pointer; color: #e74c3c; font-weight: bold; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #fafafa; }
        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: black; color: white; padding: 12px 28px; border-radius: 50px; display: none; z-index: 3000; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        .checkout-alert { background: #f0f0f0; color: #000; padding: 10px; border-radius: 6px; font-size: 11px; font-weight: bold; text-align: center; margin: 10px 0; border: 1px dashed #333; }
        .ig { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; background: black; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; font-weight: bold; }
        
        .about-text { line-height: 1.8; color: #333; }
        .highlight { color: black; font-weight: 800; border-bottom: 2px solid black; }
    </style>
</head>
<body>

<div id="loader">AETHELL</div>
<div class="trust-bar">FREE SHIPPING IN MUMBAI • CUSTOM DESIGNS AVAILABLE</div>
<div class="menu" onclick="toggleMenu()">☰</div>
<div class="cart" onclick="openCart()">🛒 <span id="count">0</span></div>
