<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AETHELL</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
color:black;
}

#loader{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
letter-spacing:6px;
z-index:2000;
}

header{
text-align:center;
margin:30px 0 5px 0;
font-size:30px;
letter-spacing:5px;
}

.caption{
font-size:14px;
letter-spacing:3px;
opacity:.7;
}

.products{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.product img{
width:100%;
border-radius:10px;
cursor:pointer;
}

.price{
font-weight:bold;
}

.old{
text-decoration:line-through;
color:gray;
margin-left:5px;
font-size:13px;
}

.off{
color:green;
font-size:13px;
margin-left:5px;
}

.emi{
font-size:12px;
opacity:.7;
}

.product button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
background:black;
color:white;
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:white;
padding:25px;
width:90%;
max-width:420px;
border-radius:10px;
}

.cartButton{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
margin-top:10px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
}

.summary{
background:#f6f6f6;
padding:10px;
margin-top:10px;
font-size:14px;
}

</style>
</head>

<body>

<div id="loader">AETHELL</div>

<header>
AETHELL
<div class="caption">Modern décor for modern spaces</div>
</header>

<section class="products" id="productContainer"></section>

<div class="popup" id="checkoutPopup">

<div class="popup-content">

<h2>Checkout</h2>

<input id="name" placeholder="Name">
<input id="address" placeholder="Full Address">

<select id="plan" onchange="updatePlan()">
<option value="full">Full Payment</option>
<option value="2">2 Month Plan</option>
<option value="3">3 Month Plan</option>
</select>

<div class="summary" id="summary"></div>

<button class="cartButton" onclick="pay()">Pay With UPI</button>

</div>

</div>

<script>

setTimeout(()=>loader.style.display="none",1000)

const container=document.getElementById("productContainer")

let products=[

{name:"CMIYGL Mirror",price:5999,img:"cmiygl1.jpg"},

{name:"MS PAINT Mirror",price:8999,img:"mspaint1.jpg"},

{name:"reCAPTCHA Mirror",price:5999,img:"captcha1.jpg"},

{name:"Queen of Hearts",price:5499,img:"queen1.jpg"},

{name:"King of Hearts",price:5499,img:"king1.jpg"}

]

let currentProduct=null

products.forEach((p,i)=>{

let original=Math.round(p.price/0.8)
let emi=Math.round(p.price/3)

container.innerHTML+=`

<div class="product">

<img src="${p.img}" onclick="openCheckout(${i})">

<h3>${p.name}</h3>

<div class="price">

₹${p.price}

<span class="old">₹${original}</span>

<span class="off">20% OFF</span>

</div>

<div class="emi">From ₹${emi}/month</div>

<button onclick="openCheckout(${i})">Buy</button>

</div>

`

})

function openCheckout(i){

currentProduct=products[i]

checkoutPopup.style.display="flex"

updatePlan()

}

function updatePlan(){

let plan=document.getElementById("plan").value

let total=currentProduct.price

let text=""

if(plan=="full"){

text=`
Total Price: ₹${total}
Pay Now: ₹${total}
`

}

if(plan=="2"){

let emi=Math.round(total/2)

text=`
Total Price: ₹${total}<br>
Plan: 2 Months<br>
Pay Now: ₹${emi}<br>
Month 2: ₹${emi}
`

}

if(plan=="3"){

let emi=Math.round(total/3)

text=`
Total Price: ₹${total}<br>
Plan: 3 Months<br>
Pay Now: ₹${emi}<br>
Month 2: ₹${emi}<br>
Month 3: ₹${emi}
`

}

summary.innerHTML=text

}

function pay(){

let name=document.getElementById("name").value

let address=document.getElementById("address").value

let plan=document.getElementById("plan").value

let total=currentProduct.price

let payAmount=total

if(plan=="2") payAmount=Math.round(total/2)

if(plan=="3") payAmount=Math.round(total/3)

let message=`New AETHELL Order%0AProduct:${currentProduct.name}%0APlan:${plan}%0AName:${name}%0AAddress:${address}%0ATotal:${total}`

window.open(`https://wa.me/919987782822?text=${message}`)

window.location.href=`upi://pay?pa=aditya.kbelose@oksbi&pn=Aethell&am=${payAmount}&cu=INR`

}

</script>

</body>
</html>
