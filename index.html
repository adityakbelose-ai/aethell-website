<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AETHELL</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
color:black;
}

/* loader */

#loader{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
letter-spacing:5px;
z-index:1000;
}

/* header */

header{
display:flex;
justify-content:center;
align-items:center;
padding:20px;
font-size:28px;
letter-spacing:4px;
}

/* hamburger */

.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:26px;
cursor:pointer;
z-index:1001;
}

/* sidebar */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:white;
box-shadow:2px 0 10px rgba(0,0,0,0.1);
transition:0.3s;
padding-top:80px;
z-index:1000;
}

.sidebar a{
display:block;
padding:15px 25px;
text-decoration:none;
color:black;
font-size:16px;
}

.sidebar a:hover{
background:#f5f5f5;
}

.sidebar.open{
left:0;
}

/* cart */

.cart{
position:fixed;
top:20px;
right:20px;
background:black;
color:white;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

/* products */

.products{
padding:20px;
}

.product{
margin-bottom:40px;
cursor:pointer;
}

.product img{
width:100%;
border-radius:10px;
transition:.4s;
}

.product:hover img{
transform:scale(1.02);
}

/* viewer */

#viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
overflow:auto;
z-index:999;
}

.viewer-content{
padding:20px;
}

.viewer-content img{
width:100%;
border-radius:10px;
}

.desc{
margin-top:10px;
color:#555;
}

.dim{
font-size:14px;
color:#777;
}

/* buttons */

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
background:black;
color:white;
font-size:15px;
cursor:pointer;
}

/* checkout */

#checkout{
display:none;
padding:20px;
}

.checkout-item{
display:flex;
align-items:center;
margin-bottom:15px;
}

.checkout-item img{
width:70px;
border-radius:6px;
margin-right:10px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

</style>

</head>

<body>

<div id="loader">AETHELL</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="sidebar">

<a href="#">Home</a>

<a href="#about">About Us</a>

<a href="https://forms.gle/YOURGOOGLEFORM" target="_blank">
Custom Mirror
</a>

<a href="mailto:your@email.com">Contact</a>

</div>

<header>AETHELL</header>

<div class="cart" onclick="openCheckout()">🛒 <span id="cartCount">0</span></div>

<section class="products">

<div class="product" onclick="openProduct(0)">
<img src="cmiygl1.jpg">
<h3>CMIYGL Mirror</h3>
<p>₹5,999</p>
</div>

<div class="product" onclick="openProduct(1)">
<img src="mspaint1.jpg">
<h3>MS PAINT Mirror</h3>
<p>₹8,999</p>
</div>

<div class="product" onclick="openProduct(2)">
<img src="captcha1.jpg">
<h3>reCAPTCHA Mirror</h3>
<p>₹5,999</p>
</div>

<div class="product" onclick="openProduct(3)">
<img src="queen1.jpg">
<h3>Queen of Hearts Mirror</h3>
<p>₹5,499</p>
</div>

<div class="product" onclick="openProduct(4)">
<img src="king1.jpg">
<h3>King of Hearts Mirror</h3>
<p>₹5,499</p>
</div>

</section>

<div id="viewer">

<div class="viewer-content">

<img id="viewerImg">

<h2 id="viewerTitle"></h2>

<p id="viewerDesc" class="desc"></p>

<p id="viewerDim" class="dim"></p>

<button onclick="addToCart()">Add To Cart</button>

<button onclick="buyNow()">Buy Now</button>

<button onclick="closeViewer()">Close</button>

</div>

</div>

<div id="checkout">

<h2>Checkout</h2>

<div id="orderPreview"></div>

<input placeholder="Building / Society">
<input placeholder="Flat Number">
<input placeholder="Area / Street">
<input placeholder="Pincode">

<label>
<input type="radio" name="pay" value="upi" checked>
UPI / GPay
</label>

<br>

<label>
<input type="radio" name="pay" value="cod">
Cash On Delivery
</label>

<button onclick="checkout()">Checkout</button>

</div>

<script>

setTimeout(()=>{
document.getElementById("loader").style.display="none"
},1500)

/* sidebar */

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open")
}

/* products */

let products=[

{
name:"CMIYGL Mirror",
price:5999,
img:"cmiygl1.jpg",
desc:"Inspired by the iconic album aesthetic.",
dim:'15" x 24"'
},

{
name:"MS PAINT Mirror",
price:8999,
img:"mspaint1.jpg",
desc:"Retro digital nostalgia mirror.",
dim:'47" x 31"'
},

{
name:"reCAPTCHA Mirror",
price:5999,
img:"captcha1.jpg",
desc:"Concept piece inspired by identity verification.",
dim:'42" x 31"'
},

{
name:"Queen of Hearts Mirror",
price:5499,
img:"queen1.jpg",
desc:"Royal aesthetic for elegant spaces.",
dim:'48" x 31"'
},

{
name:"King of Hearts Mirror",
price:5499,
img:"king1.jpg",
desc:"Bold regal design for modern interiors.",
dim:'48" x 31"'
}

]

let selected=null
let cart=[]

function openProduct(i){

selected=i

document.getElementById("viewerImg").src=products[i].img
document.getElementById("viewerTitle").innerText=products[i].name
document.getElementById("viewerDesc").innerText=products[i].desc
document.getElementById("viewerDim").innerText="Dimensions: "+products[i].dim

document.getElementById("viewer").style.display="block"

}

function closeViewer(){
document.getElementById("viewer").style.display="none"
}

function addToCart(){

cart.push(products[selected])

document.getElementById("cartCount").innerText=cart.length

}

function buyNow(){

cart=[products[selected]]

openCheckout()

}

function openCheckout(){

document.getElementById("checkout").style.display="block"

let html=""

cart.forEach(p=>{

html+=`
<div class="checkout-item">
<img src="${p.img}">
<div>${p.name}</div>
</div>
`

})

document.getElementById("orderPreview").innerHTML=html

window.scrollTo(0,document.body.scrollHeight)

}

function checkout(){

let total=0

cart.forEach(p=>total+=p.price)

let payment=document.querySelector('input[name="pay"]:checked').value

if(payment==="upi"){

window.location.href=
"upi://pay?pa=aditya.kbelose@oksbi&pn=Aethell&am="+total+"&cu=INR"

}else{

let msg="New AETHELL Order%0A"

cart.forEach(p=>msg+=p.name+"%0A")

window.location.href=
"https://wa.me/919987782822?text="+msg

}

}

</script>

</body>
</html>
