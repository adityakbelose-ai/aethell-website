<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AETHELL</title>

<style>
body{margin:0;font-family:Arial;background:white;color:black;}

#loader{position:fixed;width:100%;height:100%;background:black;color:white;display:flex;justify-content:center;align-items:center;font-size:36px;letter-spacing:6px;z-index:2000;}

header{display:flex;align-items:center;justify-content:center;margin:30px 0;font-size:30px;letter-spacing:5px;}
header:before,header:after{content:"";flex:1;height:1px;background:black;margin:0 15px;}

.menu{position:fixed;left:20px;top:20px;font-size:28px;cursor:pointer;z-index:1001;}

.sidebar{position:fixed;left:-270px;top:0;width:270px;height:100%;background:white;box-shadow:2px 0 10px rgba(0,0,0,0.15);transition:.3s;padding-top:60px;z-index:1000;}
.sidebar.open{left:0;}

.closeSidebar{position:absolute;top:15px;right:20px;font-size:22px;cursor:pointer;}

.sidebar a{display:block;padding:15px 25px;text-decoration:none;color:black;font-size:16px;}

.cart{position:fixed;right:20px;top:20px;background:black;color:white;padding:8px 14px;border-radius:20px;cursor:pointer;z-index:1001;}

.products{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:20px;}

.product{cursor:pointer;}

.imageWrap{
position:relative;
border-radius:10px;
}

.imageWrap img{
width:100%;
border-radius:10px;
display:block;
position:relative;
z-index:1;
}

/* GLOW ONLY AROUND IMAGE */

.imageWrap::before{
content:"";
position:absolute;
top:-5px;left:-5px;right:-5px;bottom:-5px;
border-radius:12px;
background:linear-gradient(45deg,#ff00ff,#00ffff,#ff00ff,#00ffff);
background-size:400% 400%;
opacity:0;
transition:.3s;
animation:glow 5s linear infinite;
z-index:0;
pointer-events:none;
}

.imageWrap:hover::before{
opacity:1;
}

@keyframes glow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.product h3{margin:10px 0 5px 0;font-size:16px;}
.product p{margin:0;font-size:14px;}

.product button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
background:black;
color:white;
cursor:pointer;
}

#productPage{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
overflow:auto;
z-index:1200;
}

#productPage img{width:100%;border-radius:10px;}

#productPage button{
padding:12px;
width:100%;
margin-top:10px;
border:none;
background:black;
color:white;
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:1500;
}

.popup-content{
background:white;
padding:25px;
width:90%;
max-width:420px;
border-radius:10px;
}

.checkout-item{display:flex;align-items:center;margin-bottom:10px;}
.checkout-item img{width:60px;margin-right:10px;border-radius:6px;}

.remove{margin-left:auto;color:red;cursor:pointer;}

input{width:100%;padding:12px;margin:8px 0;}

.ig{
position:fixed;
bottom:20px;
right:20px;
width:50px;
height:50px;
background:black;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#cartToast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px 20px;
border-radius:6px;
display:none;
z-index:2000;
}
</style>
</head>

<body>

<div id="loader">AETHELL</div>

<div class="menu" onclick="toggleMenu()">☰</div>
<div class="cart" onclick="openCart()">🛒 <span id="count">0</span></div>

<div class="sidebar" id="sidebar">
<div class="closeSidebar" onclick="toggleMenu()">✕</div>
<a href="#">Home</a>
<a onclick="openAbout()">About Us</a>
<a href="https://docs.google.com/forms/d/e/1FAIpQLSdE6cRXuMMelbPQpyuv9FouDaYFMsJxm6UblKyjkCCFOIllNg/viewform?usp=header" target="_blank">Custom Mirror</a>
<a href="https://wa.me/919987782822">Contact Us</a>
</div>

<header>AETHELL</header>

<section class="products">

<div class="product">
<div class="imageWrap">
<img src="cmiygl1.jpg" onclick="openProduct(0)">
</div>
<h3>CMIYGL Mirror</h3>
<p>₹5,999</p>
<button onclick="addCartDirect(0)">Add to Cart</button>
<button onclick="buyDirect(0)">Buy Now</button>
</div>

<div class="product">
<div class="imageWrap">
<img src="mspaint1.jpg" onclick="openProduct(1)">
</div>
<h3>MS PAINT Mirror</h3>
<p>₹8,999</p>
<button onclick="addCartDirect(1)">Add to Cart</button>
<button onclick="buyDirect(1)">Buy Now</button>
</div>

<div class="product">
<div class="imageWrap">
<img src="captcha1.jpg" onclick="openProduct(2)">
</div>
<h3>reCAPTCHA Mirror</h3>
<p>₹5,999</p>
<button onclick="addCartDirect(2)">Add to Cart</button>
<button onclick="buyDirect(2)">Buy Now</button>
</div>

<div class="product">
<div class="imageWrap">
<img src="queen1.jpg" onclick="openProduct(3)">
</div>
<h3>Queen of Hearts</h3>
<p>₹5,499</p>
<button onclick="addCartDirect(3)">Add to Cart</button>
<button onclick="buyDirect(3)">Buy Now</button>
</div>

<div class="product">
<div class="imageWrap">
<img src="king1.jpg" onclick="openProduct(4)">
</div>
<h3>King of Hearts</h3>
<p>₹5,499</p>
<button onclick="addCartDirect(4)">Add to Cart</button>
<button onclick="buyDirect(4)">Buy Now</button>
</div>

</section>

<div id="cartToast">Added to Cart</div>

<script>

setTimeout(()=>{document.getElementById("loader").style.display="none"},1200)

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open")
}

let cart=[]

function addCartDirect(i){
cart.push(i)
updateCart()
showToast()
}

function buyDirect(i){
cart=[i]
updateCart()
openCart()
}

function updateCart(){
document.getElementById("count").innerText=cart.length
}

function showToast(){
let toast=document.getElementById("cartToast")
toast.style.display="block"
setTimeout(()=>{toast.style.display="none"},1500)
}

</script>

</body>
</html>
